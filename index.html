  <style>
    html { scroll-behavior: smooth; }

    /* 진입 애니메이션 */
    @keyframes fadeUp { from { opacity:0; transform: translateY(24px);} to {opacity:1; transform:none;} }
    /* 시설 사진 마퀴 (옆으로 끊김 없이 흐름) — 사진묶음 2배 복제 후 -50% 이동 */
    @keyframes marquee { from { transform: translateX(0); } to { transform: translateX(-50%); } }
    .reveal { opacity:0; }
    .reveal.in { animation: fadeUp .7s cubic-bezier(.22,.61,.36,1) forwards; }
    .no-scrollbar::-webkit-scrollbar { display:none; }
    .no-scrollbar { -ms-overflow-style:none; scrollbar-width:none; }

    /* 부드러운 컬러 글로우 오브 */

    /* 섹션 구분 헤어라인 (오렌지 페이드) */
    .hairline { height:1px; background:linear-gradient(90deg, transparent, rgba(255,106,26,.35), transparent); }
    /* 칼럼 시네마틱 — 움직이는 배경 */
    @keyframes kenburns { 0% { transform: scale(1.05); } 100% { transform: scale(1.2); } }
    .kenburns { animation: kenburns 22s ease-out forwards; will-change: transform; }
    @keyframes drift  { 0%,100% { transform: translate(0,0); } 50% { transform: translate(38px,-30px); } }
    @keyframes drift2 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(-46px,28px); } }
    .drift  { animation: drift  16s ease-in-out infinite; }
    .drift2 { animation: drift2 21s ease-in-out infinite; }
    /* 본문 첫 글자 드롭캡 */

    /* 천천히 떠오르는 배경 그라데이션(은은한 오로라) */
    @keyframes auroraShift { 0%,100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }

  <!-- Babel 최신 standalone이 JSX를 'automatic' 런타임(react/jsx-runtime import 구문)으로
       변환하면 모듈 시스템이 없는 브라우저에서 SyntaxError가 나 화면 전체가 비어버린다.
       → React.createElement 를 쓰는 'classic' 런타임을 강제하는 프리셋을 등록한다. -->
  <script>
    Babel.registerPreset('react-classic', {
      presets: [[Babel.availablePresets['react'], { runtime: 'classic' }]],
    });
  </script>
