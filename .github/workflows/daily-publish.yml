name: 매일 예약발행 (브로 저널)

# 매일 정해진 시각에 Netlify를 재빌드시켜, 그날 발행일이 된 칼럼을 자동 공개한다.
# 맥북이 꺼져 있어도 GitHub 클라우드에서 알아서 실행됨.
on:
  schedule:
    - cron: "10 15 * * *"   # 매일 00:10 KST (UTC 15:10) — 시간 바꾸려면 이 줄만 수정
  workflow_dispatch: {}      # Actions 탭에서 수동 실행 버튼

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Netlify 재빌드 트리거 (예약글 공개)
        env:
          HOOK: ${{ secrets.NETLIFY_BUILD_HOOK }}
        run: |
          if [ -z "$HOOK" ]; then
            echo "::error::NETLIFY_BUILD_HOOK 시크릿이 비어 있습니다. 저장소 Settings > Secrets 에 추가하세요."
            exit 1
          fi
          curl -fsSL -X POST -d '{}' "$HOOK"
          echo "✅ Netlify 재빌드 요청 보냄."

      - name: 배포 반영 대기
        run: sleep 150

      - name: 소스 체크아웃
        uses: actions/checkout@v4

      - name: 검색엔진(네이버·빙) 새 글 알림
        run: python3 tools/publish.py --ping
